<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Radio Player 📻</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .radio-container {
            background: #222235;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #3a3a55;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #00d2ff;
        }

        .station-playing {
            font-size: 14px;
            color: #a0a0ba;
            margin-bottom: 25px;
            height: 20px;
        }

        /* Στυλ για τη λίστα σταθμών */
        select {
            width: 100%;
            padding: 12px;
            background: #2a2a40;
            color: #fff;
            border: 1px solid #444;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            margin-bottom: 25px;
        }

        /* Κουμπιά ελέγχου */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        button {
            background: #00d2ff;
            color: #1e1e2f;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 210, 255, 0.3);
        }

        button:hover {
            background: #00b4db;
            transform: scale(1.05);
        }

        button.pause-btn {
            background: #ff4757;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
        }

        button.pause-btn:hover {
            background: #ff6b81;
        }

        /* Ρύθμιση έντασης */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .volume-container span {
            font-size: 18px;
        }

        input[type="range"] {
            accent-color: #00d2ff;
            cursor: pointer;
            width: 60%;
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Web Radio Player</h1>
        <div class="station-playing" id="current-station">Επιλέξτε σταθμό για να ξεκινήσετε</div>

        <select id="station-select" onchange="changeStation()">
            <option value="" disabled selected>-- Επιλογή Σταθμού --</option>
            <option value="https://stream.radiojar.com/enlefko877">En Lefko 87.7</option>
            <option value="https://diesi.live24.gr/diesi1013">Diesi 101.3</option>
            <option value="https://red.live24.gr/red963">Red FM 96.3</option>
            <option value="https://mad.live24.gr/madradio">Mad Radio 106.2</option>
        <option value= "https://live24.gr/radio/generic.jsp?sid=3170>TOP FM 106.5"</option>
            </select>

        <div class="controls">
            <button onclick="playRadio()">▶ PLAY</button>
            <button class="pause-btn" onclick="pauseRadio()">⏸ PAUSE</button>
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume()">
            <span>🔊</span>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const stationSelect = document.getElementById('station-select');
        const currentStationText = document.getElementById('current-station');
        const volumeSlider = document.getElementById('volume-slider');

        // Αρχική ένταση ήχου στο 50%
        audio.volume = volumeSlider.value;

        // Αλλαγή σταθμού
        function changeStation() {
            const selectedUrl = stationSelect.value;
            const selectedName = stationSelect.options[stationSelect.selectedIndex].text;
            
            if (selectedUrl) {
                audio.src = selectedUrl;
                currentStationText.textContent = "Αναπαραγωγή: " + selectedName;
                playRadio();
            }
        }

        // Έναρξη
        function playRadio() {
            if (audio.src) {
                audio.play().catch(error => {
                    console.log("Η αναπαραγωγή μπλοκαρίστηκε από τον browser, πατήστε ξανά Play.");
                });
            } else {
                alert("Παρακαλώ επιλέξτε πρώτα έναν σταθμό από τη λίστα!");
            }
        }

        // Παύση
        function pauseRadio() {
            audio.pause();
        }

        // Ρύθμιση έντασης ήχου
        function changeVolume() {
            audio.volume = volumeSlider.value;
        }
    </script>

</body>
</html>
